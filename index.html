<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Day Planner</title>
  <link rel="stylesheet" href="website2.css" />
</head>
<body>
  <main class="container">
    <header>
      
      <h1>Smart Day Planner With Orca</h1>
      <p>Plan your day based on weather, location, personality,and vibe.</p>
    </header>

    <section class="controls">
      <button id="locationBtn">Use My Location🧭</button>

      <div class="manual-location">
        <input type="text" id="cityInput" placeholder="Enter your city" />
        <button id="citySearchBtn">Search</button>
      </div>

      <div class="MBTI-Input">
        <input type="text" id="mbtiInput" placeholder="Enter your MBTI" />
        <button id="MBTISearchBtn">Pair</button>
        <button id="MBTITestBtn">Don't Know Yours? Test It Here</button>
      </div>

      <div class="vibes">
        <button class="vibe-btn" data-vibe="chill">Chill</button>
        <button class="vibe-btn" data-vibe="productive">Productive</button>
        <button class="vibe-btn" data-vibe="outdoors">Outdoors</button>
        <button class="vibe-btn" data-vibe="treat">Treat Myself</button>
        <button class="vibe-btn" data-vibe="treat">Relax & Sleep</button>
      </div>

      <div class="quotes">
        <button id="quoteSearchBtn">Want an Inspring quote? Click here</button>
      </div>
    </section>

    <section id="statusMessage" class="status"></section>

    <section id="weatherCard" class="card hidden">
      <h2>Weather</h2>
      <p id="weatherOutput"></p>
    </section>

    <section id="planCard" class="card hidden">
      <h2>Today's Plan</h2>
      <p id="planOutput"></p>
    </section>

    <section id="placesCard" class="card hidden">
      <h2>Nearby Suggestions</h2>
      <ul id="placesOutput"></ul>
    </section>

    <section id="quoteCard" class="card hidden">
      <h2>Bonus Vibe</h2>
      <p id="quoteOutput"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
